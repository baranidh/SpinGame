<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Decentralized IAM : Spin and Win — Expert Engineer Expo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Fredoka:wght@500;600;700&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="confetti-canvas"></canvas>

  <main class="container">
    <header class="header">
      <div class="brand">Expert Engineer Expo</div>
      <h1>🎡 Decentralized IAM : Spin and Win</h1>
    </header>

    <nav class="tabs">
      <button type="button" class="tab active" data-tab="spin">🎡 Spin &amp; Win</button>
      <button type="button" class="tab" data-tab="quiz">❓ Quiz</button>
    </nav>

    <div id="spin-panel" class="panel">
    <section id="name-screen" class="screen">
      <h2>Enter your name to play</h2>
      <form id="name-form">
        <input id="player-name" type="text" maxlength="30" placeholder="Your name" required autocomplete="off" />
        <button type="submit">Continue</button>
      </form>
    </section>

    <section id="game-screen" class="screen" hidden>
      <h2>Good luck, <span id="player-name-display"></span>!</h2>

      <div class="wheel-wrapper">
        <div class="wheel-ring" id="wheel-ring"></div>
        <div id="wheel" class="wheel"></div>
        <div class="wheel-hub">★</div>
        <div class="pointer"></div>
      </div>

      <button id="spin-btn" type="button">SPIN</button>

      <div id="result" class="result" hidden></div>

      <button id="play-again-btn" type="button" hidden>Play Again</button>
    </section>
    </div>

    <div id="quiz-panel" class="panel" hidden>
      <h2>Decentralized Authentication Quiz</h2>
      <p class="quiz-intro">Answer all four questions, then submit to see your score.</p>
      <form id="quiz-form"></form>
      <button id="quiz-submit" type="button">Submit Answers</button>
      <div id="quiz-result" class="result" hidden></div>
      <button id="quiz-retry" type="button" hidden>Try Again</button>
    </div>
  </main>

  <!-- Discreet operator control: tap a colour to preset the next result. -->
  <div id="rig-control" class="rig-control" aria-hidden="true"></div>

  <script src="config.js"></script>
  <script src="confetti.js"></script>
  <script src="app.js"></script>
  <script src="quiz.js"></script>
</body>
</html>
