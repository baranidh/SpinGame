<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spin Game — Admin</title>
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="admin.css" />
</head>
<body>
  <main class="container admin-container">
    <header class="header">
      <h1>⚙️ Admin Panel</h1>
      <a class="admin-link" href="index.html">Back to game</a>
    </header>

    <section id="login-screen" class="screen">
      <h2>Enter admin password</h2>
      <form id="login-form">
        <input id="password-input" type="password" placeholder="Password" autocomplete="off" required />
        <button type="submit">Unlock</button>
      </form>
      <p id="login-error" class="error" hidden>Incorrect password.</p>
    </section>

    <section id="admin-screen" class="screen" hidden>
      <h2>Outcome probabilities</h2>
      <p class="hint">Weights are relative — they don't need to total 100. Higher weight = more likely. Changes apply to this browser only.</p>

      <form id="weights-form" class="weights-form">
        <div id="weights-list"></div>
        <p id="total-display" class="hint"></p>
        <div class="admin-actions">
          <button type="submit">Save</button>
          <button type="button" id="reset-btn" class="secondary">Reset to defaults</button>
        </div>
      </form>
      <p id="save-msg" class="success" hidden>Saved!</p>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
